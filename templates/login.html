{% extends 'base.html' %}

{% block title %}로그인 | 사랑이 두근둔포{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card glass">
        <div class="login-header">
            <div class="login-logo">
                <i class="fa-solid fa-cross-sun"></i>
            </div>
            <h1>사랑이 두근둔포 로그인</h1>
            <p>2026 여름 선교 사역</p>
            <span class="mission-dates"><i class="fa-regular fa-calendar-days"></i> 8월 15일 ~ 16일</span>
        </div>

        {% if error %}
        <div class="alert alert-error">
            <i class="fa-solid fa-triangle-exclamation"></i> <span>{{ error }}</span>
        </div>
        {% endif %}

        <form action="{{ url_for('login') }}" method="POST" class="login-form">
            <div class="form-group">
                <label for="username"><i class="fa-solid fa-user"></i> 이름</label>
                <input type="text" id="username" name="username" placeholder="이름을 입력하세요 (예: 홍길동)" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password"><i class="fa-solid fa-lock"></i> 비밀번호 (전화번호 뒤 4자리)</label>
                <input type="password" id="password" name="password" placeholder="전화번호 뒤 4자리를 입력하세요 (예: 1234)" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                <span>로그인하기</span> <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </form>

        <div class="login-footer">
            <p class="login-hint">
                <i class="fa-solid fa-circle-info"></i> 등록된 이름과 전화번호 뒤 4자리로 로그인해 주세요.
            </p>
        </div>
    </div>
</div>
{% endblock %}
